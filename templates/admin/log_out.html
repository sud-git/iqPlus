<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout</title>

    <!-- Cache Disable -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card shadow-lg p-4 text-center" style="width:380px;">
    <h3 class="text-danger mb-3">Are you sure you want to Logout?</h3>

    <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-between mt-4">
            <a href='../admin_dashboard' class="btn btn-secondary w-45">Cancel</a>
            <button type="submit" class="btn btn-danger w-45">Logout</button>
        </div>
    </form>
</div>

</body>
</html>
