<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | School Test System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .sidebar {
            height: 100vh;
            background: linear-gradient(180deg,#0d6efd,#0b5ed7);
            color: #fff;
        }
        .sidebar a {
            color: #fff;
            text-decoration: none;
            padding: 12px 18px;
            display: block;
            transition: 0.3s;
        }
        .sidebar a:hover, .active-link {
            background: rgba(255,255,255,0.15);
            padding-left: 25px;
        }
        .card-box {
            border-radius: 14px;
            transition: 0.3s;
        }
        .card-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar p-0">
        <h5 class="text-center py-3 border-bottom">
            Welcome, {{ admin.full_name }}
        </h5>

        <a href="{% url 'admin_dashboard' %}" class="active-link">
            <i class="fa fa-dashboard me-2"></i> Dashboard
        </a>

        <a href="../question_bank">
            <i class="fa fa-question-circle me-2"></i> Question Bank
        </a>

        <a href="../result">
            <i class="fa fa-chart-bar me-2"></i> Results
        </a>

        <a href="../log_out" class="text-warning">
            <i class="fa fa-sign-out-alt me-2"></i> Logout
        </a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

        <h4 class="mb-4 fw-bold">Dashboard Overview</h4>

        <div class="row g-4">

            <!-- Classes -->
            <div class="col-md-4">
                <div class="card card-box text-center p-4">
                    <i class="fa fa-school fa-2x text-primary"></i>
                    <h6 class="mt-3">Total Classes</h6>
                    <h2 class="fw-bold">{{ stats.total_classes }}</h2>
                </div>
            </div>

            <!-- Subjects -->
            <div class="col-md-4">
                <div class="card card-box text-center p-4">
                    <i class="fa fa-book fa-2x text-success"></i>
                    <h6 class="mt-3">Total Subjects</h6>
                    <h2 class="fw-bold">{{ stats.total_subjects }}</h2>
                </div>
            </div>

            <!-- Tests -->
            <div class="col-md-4">
                <div class="card card-box text-center p-4">
                    <i class="fa fa-file-alt fa-2x text-danger"></i>
                    <h6 class="mt-3">Total Tests</h6>
                    <h2 class="fw-bold">{{ stats.total_tests }}</h2>
                </div>
            </div>

        </div>

    </div>
</div>
</div>

</body>
</html>
