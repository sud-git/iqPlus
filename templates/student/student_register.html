<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart School Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-box{
    background:#fff;
    width:100%;
    max-width:900px;
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.form-control, .form-select{
    border-radius:10px;
}

.btn-custom{
    background:linear-gradient(135deg,#667eea,#764ba2);
    border:none;
    color:#fff;
    border-radius:12px;
    font-weight:600;
}

.btn-custom:hover{
    transform:translateY(-2px);
}
</style>
</head>
<body>

<div class="card-box">

<h3 class="text-center mb-4">Smart School Portal</h3>

<!-- ================= STUDENT REGISTRATION ================= -->
<h5 class="mb-3 text-primary">Student Registration</h5>

<form method="post" action="/student_register_code/">
{% csrf_token %}

<div class="row">
    <div class="col-md-6 mb-3">
        <label>Student Name</label>
        <input type="text" name="student_name" class="form-control" required>
    </div>


    <div class="col-md-6 mb-3">
        <label>Father Name</label>
        <input type="text" name="father_name" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label>Mobile Number</label>
        <input type="tel" name="mobile" class="form-control" pattern="[0-9]{10}" maxlength="10" required>
    </div>

    <div class="col-md-6 mb-3">
        <label>School Name</label>
        <input type="text" name="s_name" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label>Class</label>
        <select name="student_class" class="form-select" required>
            <option value="">Select Class</option>
            <option>Class 1</option>
            <option>Class 2</option>
            <option>Class 3</option>
            <option>Class 4</option>
            <option>Class 5</option>
            <option>Class 6</option>
            <option>Class 7</option>
            <option>Class 8</option>
            <option>Class 9</option>
            <option>Class 10</option>
            <option>Class 11</option>
            <option>Class 12</option>
        </select>
    </div>


    <div class="col-md-6 mb-3">
        <label>Pin Code</label>
        <input type="number" name="pin_code" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label>District</label>
        <input type="text" name="district" class="form-control" required>
    </div>
</div>

<div class="mb-3">
    <label>Full Address</label>
    <textarea name="address" class="form-control" rows="2" required></textarea>
</div>

<hr>

<div class="row">
    <div class="col-md-6 mb-3">
        <label>Username</label>
        <input type="text" name="username" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>
</div>

<button type="submit" class="btn btn-custom w-100 mb-3">
<i class="fa fa-user-plus me-2"></i> Register Now
</button>

</form>

<hr>

<!-- ================= LOGIN BUTTON SECTION ================= -->

<div class="text-center mt-4">

<a href="{% url 'student_login' %}" class="btn btn-success me-3">
<i class="fa fa-sign-in-alt me-2"></i> Student Login
</a>

<a href="{% url 'admin_login' %}" class="btn btn-dark">
<i class="fa fa-lock me-2"></i> Admin Login
</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
