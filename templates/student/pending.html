<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pending Tests</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    padding:40px;
}

.test-card{
    background:#ffffff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.test-card:hover{
    transform:translateY(-5px);
}

.badge{
    font-size:12px;
}

</style>
</head>
<body>

<div class="container">

<h3 class="mb-4">Pending Tests</h3>

<div class="row g-4">

{% for test in pending_tests %}
<div class="col-md-4">

    <div class="test-card">

        <h5>{{ test.test_name }}</h5>
        <span class="badge bg-warning text-dark">Pending</span>

        <hr>

        <p><strong>Duration:</strong> {{ test.duration }} Minutes</p>
        <p><strong>Total Questions:</strong> {{ test.total_questions }}</p>
        <p><strong>Total Marks:</strong> {{ test.total_marks }}</p>

        <a href="{% url 'start_test' test.id %}" class="btn btn-primary btn-sm mt-2">
            Start Test
        </a>

    </div>

</div>
{% empty %}
<div class="col-12">
    <div class="alert alert-success">
        🎉 You have completed all available tests!
    </div>
</div>
{% endfor %}

</div>

</div>

</body>
</html>
