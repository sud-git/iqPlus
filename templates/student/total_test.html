<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Tests</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    padding:40px;
}

.test-card{
    border-radius:15px;
    padding:20px;
    background:#fff;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.test-card:hover{
    transform:translateY(-5px);
}

.status-badge{
    font-size:12px;
}
</style>
</head>
<body>

<div class="container">

<h3 class="mb-4">Available Tests</h3>

<div class="row g-4">

{% for test in tests %}
<div class="col-md-4">
    <div class="test-card">

        <h5>{{ test.test_name }}</h5>
        <p>Duration: {{ test.duration }} Minutes</p>
        <p>Total Marks: {{ test.total_marks }}</p>

        {% if test.id in attempted_test_ids %}
            <span class="badge bg-success status-badge">Attempted</span>
            <a href="{% url 'result_detail' test.studenttest_set.first.id %}" class="btn btn-outline-primary btn-sm mt-2">
                View Result
            </a>
        {% else %}
            <span class="badge bg-warning text-dark status-badge">Pending</span>
            <a href="{% url 'start_test' test.id %}" class="btn btn-primary btn-sm mt-2">
                Start Test
            </a>
        {% endif %}

    </div>
</div>
{% empty %}
<div class="col-12">
    <div class="alert alert-info">
        No tests available.
    </div>
</div>
{% endfor %}

</div>

</div>

</body>
</html>
